<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Trunk Tailwind Integration -->
    <link data-trunk rel="tailwind-css" href="tailwind.css" />
    
    <!-- Mermaid.js Integration -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({
            startOnLoad: false,
            securityLevel: 'loose',
            theme: 'neutral'
        });
        
        window.renderMermaid = async function(id, code, isDark) {
            try {
                mermaid.initialize({
                    startOnLoad: false,
                    theme: isDark ? 'dark' : 'default',
                    themeVariables: {
                        background: isDark ? '#0f172a' : '#f8fafc',
                        primaryColor: isDark ? '#1e1b4b' : '#e0e7ff',
                        primaryTextColor: isDark ? '#f8fafc' : '#1e293b',
                        lineColor: isDark ? '#334155' : '#cbd5e1',
                    }
                });
                const { svg } = await mermaid.render(id, code);
                return { success: true, svg: svg };
            } catch (err) {
                // Clean up bad nodes left by rendering failures
                const badEl = document.getElementById(id);
                if (badEl) badEl.remove();
                return { success: false, error: err.toString() };
            }
        };

        window.downloadQrCode = function(svgId, filename, format) {
            const svgEl = document.getElementById(svgId);
            if (!svgEl) return;
            
            const serializer = new XMLSerializer();
            const svgString = serializer.serializeToString(svgEl);
            
            if (format === 'svg') {
                const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename + '.svg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            } else if (format === 'png') {
                const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
                const url = URL.createObjectURL(svgBlob);
                
                const image = new Image();
                image.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 1000;
                    canvas.height = 1000;
                    const context = canvas.getContext('2d');
                    context.drawImage(image, 0, 0, 1000, 1000);
                    
                    canvas.toBlob(function(blob) {
                        const pngUrl = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = pngUrl;
                        link.download = filename + '.png';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(pngUrl);
                        URL.revokeObjectURL(url);
                    }, 'image/png');
                };
                image.src = url;
            }
        };
    </script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-dvh antialiased transition-colors duration-300">
    <!-- Leptos App Mount Point -->
</body>
</html>
